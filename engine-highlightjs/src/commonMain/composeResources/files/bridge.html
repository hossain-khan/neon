<!DOCTYPE html>
<html><body>
<pre><code id="code"></code></pre>
<script src="highlight.min.js"></script>
<script>
// https://highlightjs.readthedocs.io/en/latest/api.html#highlightelement
function highlightCode(code, lang) {
  try {
    const block = document.getElementById("code");
    block.textContent = code;
    block.className = lang;
    delete block.dataset.highlighted;
    hljs.highlightElement(block);
    return JSON.stringify({ error: false, html: block.innerHTML });
  } catch(e) {
    return JSON.stringify({ error: true, message: e.message || String(e) });
  }
}

// https://highlightjs.readthedocs.io/en/latest/api.html#listlanguages
function listLanguages() {
  return hljs.listLanguages();
}

// https://highlightjs.readthedocs.io/en/latest/api.html#highlightauto
function highlightAuto(code) {
  try {
    const result = hljs.highlightAuto(code);
    return JSON.stringify({ html: result.value, language: result.language || "" });
  } catch(e) {
    return JSON.stringify({ error: true, message: e.message || String(e) });
  }
}

// https://highlightjs.readthedocs.io/en/latest/api.html#getlanguage
function getLanguage(nameOrAlias) {
  try {
    const lang = hljs.getLanguage(nameOrAlias);
    return lang ? JSON.stringify({ name: lang.name, aliases: lang.aliases || [] }) : null;
  } catch(e) {
    return JSON.stringify({ error: true, message: e.message || String(e) });
  }
}

// https://highlightjs.readthedocs.io/en/latest/api.html#versionstring
function hljsVersion() {
  return hljs.versionString;
}
</script>
</body></html>
